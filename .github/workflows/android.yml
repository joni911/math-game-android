name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build debug APK
      run: ./gradlew assembleDebug --stacktrace
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: math-fun-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 90
    
    - name: Get APK info
      id: apk_info
      run: |
        APK_FILE=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
        APK_SIZE=$(du -h "$APK_FILE" | cut -f1)
        APK_NAME=$(basename "$APK_FILE")
        echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
        echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
    
    - name: Send Discord notification
      if: success()
      run: |
        RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
        echo "✅ Build sukses! APK: ${{ steps.apk_info.outputs.apk_name }} (${{ steps.apk_info.outputs.apk_size }})"
        echo "📦 Download: $RUN_URL"
        echo "🔢 Commit: $COMMIT_URL"
    
    - name: Send Discord notification on failure
      if: failure()
      run: |
        echo "❌ Build gagal!"
        echo "🔗 Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: math-fun-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 90